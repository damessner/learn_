<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - LEARN</title>
  <style>
    :root {
      --bg-color: #f5f5f5;
      --text-color: #171717;
      --card-bg: #ffffff;
      --border-color: #e5e5e5;
      --accent-color: #7c3aed;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0a0a0a;
        --text-color: #f5f5f5;
        --card-bg: #171717;
        --border-color: #262626;
        --accent-color: #a78bfa;
      }
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 2.5rem;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    svg {
      width: 64px;
      height: 64px;
      color: var(--accent-color);
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin: 0 0 0.5rem 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    p {
      font-size: 0.875rem;
      line-height: 1.5;
      color: #737373;
      margin: 0 0 2rem 0;
    }
    button {
      background-color: var(--accent-color);
      color: #ffffff;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 4.978 4.978 0 011.414-3.536m0 0L4.828 4.828m0 0L3 3m5.464 5.464a9 9 0 00-2.728 6.364m0 0L3 18" />
    </svg>
    <h1>You are offline</h1>
    <p>Please check your internet connection. Once you are reconnected, click below to reload your learning dashboard.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
